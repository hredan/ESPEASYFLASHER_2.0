name: main_ci_cd

on: [push]

jobs:
  linux_arm64_executable:
          runs-on: ubuntu-latest
          steps:
          - name: Checkout
            uses: actions/checkout@v4
          - # Add support for more platforms with QEMU (optional)
            # https://github.com/docker/setup-qemu-action
            name: Set up QEMU
            uses: docker/setup-qemu-action@v3
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
          
          - id: buildx
            name: Build docker image arm64
            uses: docker/build-push-action@v6
            with:
              push: false
              tags: python_eef:arm64
              file: ./Dockerfile
              platforms: linux/arm64
              outputs: type=docker

          - name: run PyInstaller in docker
            run: |
              echo ######### ls ########
              ls -la
              echo ######### pwd ########
              echo $(pwd)
              echo ################# imageid ######################
              echo ${{ steps.buildx.outputs.imageid }}
              echo ######## docker version #########
              docker version
              echo ######### docker images ########
              docker images
              docker run -v $(pwd):/home/workspace -w /home/workspace -i --platform linux/arm64 python_eef:arm64 bash /home/workspace/Scripts/build_linux.
              ls -la